name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run pinned Gitleaks 8.30.1
        run: |
          curl --fail --location --silent --show-error \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            --output /tmp/gitleaks.tar.gz
          echo '551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  /tmp/gitleaks.tar.gz' | sha256sum --check --strict
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          /tmp/gitleaks dir . --no-banner --redact --verbose

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=moderate

  ops-security:
    name: Ops security and fake integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ops/phishtopia-ops-mcp
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ops/phishtopia-ops-mcp/package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Format cloudflare source
        run: npx prettier --check src/cloudflare.ts

      - name: Format constants
        run: npx prettier --check src/constants.ts

      - name: Format index
        run: npx prettier --check src/index.ts

      - name: Format server
        run: npx prettier --check src/server.ts

      - name: Format live smoke
        run: npx prettier --check src/smoke/live-smoke.ts

      - name: Format Cloudflare tests
        run: npx prettier --check src/test/cloudflare.test.ts

      - name: Format server tests
        run: npx prettier --check src/test/server.test.ts

      - name: Format README
        run: npx prettier --check README.md

      - name: Format runbook
        run: npx prettier --check docs/runbook.md

      - name: Typecheck
        run: npm run typecheck

      - name: Run TypeScript tests
        run: npm test

      - name: Run protocol smoke
        run: npm run smoke

      - name: Python worker tests
        run: python3 -m unittest discover -s worker/test -p 'test_*.py' -v

      - name: Parse every privileged shell script
        run: |
          set -eu
          for script in scripts/*.sh systemd/phishtopia-ops-mcp-tunnel-launch; do
            sh -n "$script"
          done

      - name: Reject accidental secrets and runtime data
        run: ./scripts/secret-scan.sh

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=moderate
