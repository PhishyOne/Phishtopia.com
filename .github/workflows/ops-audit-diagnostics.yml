name: Hono override compatibility report

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-audit-diagnostics.yml

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ops/phishtopia-ops-mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ops/phishtopia-ops-mcp/package-lock.json
      - run: npm ci
      - name: Generate complete override report
        run: |
          set +e
          : > override.log
          node -e 'const fs=require("node:fs"); const path="package.json"; const value=JSON.parse(fs.readFileSync(path,"utf8")); value.overrides={...(value.overrides||{}),"@hono/node-server":"2.0.5"}; fs.writeFileSync(path,JSON.stringify(value,null,2)+"\n");' >>override.log 2>&1
          echo "package_edit_exit=$?" >>override.log
          npm install --package-lock-only --ignore-scripts >>override.log 2>&1
          echo "install_exit=$?" >>override.log
          npm update --package-lock-only --ignore-scripts fast-uri >>override.log 2>&1
          echo "fast_uri_update_exit=$?" >>override.log
          npm ci >>override.log 2>&1
          echo "npm_ci_exit=$?" >>override.log
          npm run format:check >>override.log 2>&1
          echo "format_exit=$?" >>override.log
          npm run typecheck >>override.log 2>&1
          echo "typecheck_exit=$?" >>override.log
          npm test >>override.log 2>&1
          echo "test_exit=$?" >>override.log
          npm run smoke >>override.log 2>&1
          echo "smoke_exit=$?" >>override.log
          npm audit --omit=dev --json >audit-after.json 2>>override.log
          echo "audit_exit=$?" >>override.log
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: hono-override-compatibility
          path: |
            ops/phishtopia-ops-mcp/override.log
            ops/phishtopia-ops-mcp/audit-after.json
            ops/phishtopia-ops-mcp/package.json
            ops/phishtopia-ops-mcp/package-lock.json
          if-no-files-found: error
          retention-days: 1
