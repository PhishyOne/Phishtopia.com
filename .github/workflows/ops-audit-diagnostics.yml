name: Ops audit diagnostics

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-audit-diagnostics.yml

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ops/phishtopia-ops-mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ops/phishtopia-ops-mcp/package-lock.json
      - run: npm ci
      - name: Capture production audit
        run: npm audit --omit=dev --json > audit.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: ops-npm-audit
          path: ops/phishtopia-ops-mcp/audit.json
          if-no-files-found: error
          retention-days: 1
