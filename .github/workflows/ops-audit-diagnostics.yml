name: Commit Ops dependency refresh

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-audit-diagnostics.yml

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ops/phishtopia-ops-mcp
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ops/phishtopia-ops-mcp/package-lock.json
      - run: npm ci
      - name: Refresh and verify Ops dependencies
        run: |
          npm install --package-lock-only --ignore-scripts @modelcontextprotocol/sdk@1.24.3
          npm update --package-lock-only --ignore-scripts fast-uri
          npm ci
          npm run format:check
          npm run typecheck
          npm test
          npm run smoke
          npm audit --omit=dev --audit-level=moderate
      - name: Commit generated Ops dependency files
        working-directory: .
        run: |
          rm .github/workflows/ops-audit-diagnostics.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ops/phishtopia-ops-mcp/package.json ops/phishtopia-ops-mcp/package-lock.json .github/workflows/ops-audit-diagnostics.yml
          git diff --cached --quiet && exit 1
          git commit -m "Refresh vulnerable Ops dependencies"
          git push origin "HEAD:${{ github.head_ref }}"
