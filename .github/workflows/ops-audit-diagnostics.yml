name: Ops dependency compatibility report

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-audit-diagnostics.yml

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ops/phishtopia-ops-mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ops/phishtopia-ops-mcp/package-lock.json
      - run: npm ci
      - name: Generate complete compatibility report
        run: |
          set +e
          : > refresh.log
          npm install --package-lock-only --ignore-scripts @modelcontextprotocol/sdk@1.24.3 >>refresh.log 2>&1
          echo "sdk_install_exit=$?" >>refresh.log
          npm update --package-lock-only --ignore-scripts fast-uri >>refresh.log 2>&1
          echo "fast_uri_update_exit=$?" >>refresh.log
          npm ci >>refresh.log 2>&1
          echo "npm_ci_exit=$?" >>refresh.log
          npm run format:check >>refresh.log 2>&1
          echo "format_exit=$?" >>refresh.log
          npm run typecheck >>refresh.log 2>&1
          echo "typecheck_exit=$?" >>refresh.log
          npm test >>refresh.log 2>&1
          echo "test_exit=$?" >>refresh.log
          npm run smoke >>refresh.log 2>&1
          echo "smoke_exit=$?" >>refresh.log
          npm audit --omit=dev --json >audit-after.json 2>>refresh.log
          echo "audit_exit=$?" >>refresh.log
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: ops-dependency-compatibility
          path: |
            ops/phishtopia-ops-mcp/refresh.log
            ops/phishtopia-ops-mcp/audit-after.json
            ops/phishtopia-ops-mcp/package.json
            ops/phishtopia-ops-mcp/package-lock.json
          if-no-files-found: error
          retention-days: 1
