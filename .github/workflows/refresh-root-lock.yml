name: Refresh root lockfile

on:
  push:
    branches:
      - agent/autonomous-bootstrap-diagnostics
    paths:
      - .github/workflows/refresh-root-lock.yml

permissions:
  contents: write

jobs:
  refresh-lock:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/autonomous-bootstrap-diagnostics
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Regenerate Axios lock entry
        run: npm install --package-lock-only --ignore-scripts --save-prefix='^' axios@1.18.1
      - name: Verify clean production audit
        run: npm audit --omit=dev --audit-level=high
      - name: Commit generated dependency files and remove helper
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add package.json package-lock.json
          git rm .github/workflows/refresh-root-lock.yml
          git commit -m "Update Axios to audited release"
          git push origin HEAD:agent/autonomous-bootstrap-diagnostics
