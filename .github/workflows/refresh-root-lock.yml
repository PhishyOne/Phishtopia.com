name: Refresh root lockfile

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/refresh-root-lock.yml

permissions:
  contents: read

jobs:
  refresh-lock:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Regenerate Axios lock entry
        run: npm install --package-lock-only --ignore-scripts --save-prefix='^' axios@1.18.1
      - name: Verify clean production audit
        run: npm audit --omit=dev --audit-level=high
      - uses: actions/upload-artifact@v4
        with:
          name: refreshed-root-dependency-files
          path: |
            package.json
            package-lock.json
          if-no-files-found: error
          retention-days: 1
