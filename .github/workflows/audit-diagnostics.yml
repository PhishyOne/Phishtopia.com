name: Dependency refresh diagnostics

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/audit-diagnostics.yml

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Refresh vulnerable dependency entries
        run: |
          npm install --package-lock-only --ignore-scripts --save-dev nodemon@^3.1.14
          npm update --package-lock-only --ignore-scripts body-parser brace-expansion
          npm audit --omit=dev --audit-level=moderate
      - uses: actions/upload-artifact@v4
        with:
          name: refreshed-root-dependencies
          path: |
            package.json
            package-lock.json
          if-no-files-found: error
          retention-days: 1
