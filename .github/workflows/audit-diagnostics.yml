name: Commit dependency refresh

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/audit-diagnostics.yml

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Refresh and verify dependencies
        run: |
          npm install --package-lock-only --ignore-scripts --save-dev nodemon@^3.1.14
          npm update --package-lock-only --ignore-scripts body-parser brace-expansion
          npm audit --omit=dev --audit-level=moderate
      - name: Commit generated dependency files
        run: |
          rm .github/workflows/audit-diagnostics.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json .github/workflows/audit-diagnostics.yml
          git diff --cached --quiet && exit 1
          git commit -m "Refresh vulnerable root dependencies"
          git push origin "HEAD:${{ github.head_ref }}"
